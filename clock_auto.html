<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>Auto Clock</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:#0f172a;color:#e5e7eb;font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}
.card{width:min(520px,94vw);background:#111827;border:1px solid #334155;border-radius:22px;padding:22px;box-shadow:0 18px 50px rgba(0,0,0,.35)}
h1{margin:0 0 8px;font-size:26px}
p{margin:8px 0 18px;color:#cbd5e1;line-height:1.45}
.note{font-size:14px;color:#94a3b8}
button{width:100%;border:0;border-radius:14px;padding:14px 16px;margin-top:10px;font-size:17px;font-weight:bold;cursor:pointer}
.primary{background:#22c55e;color:#052e16}
.secondary{background:#334155;color:#e5e7eb}
</style>
<link rel="manifest" href="clock_manifest.json">
<link rel="apple-touch-icon" href="clock_icon_192.png">
</head>
<body>
<div class="card">
  <h1>Auto Clock</h1>
  <p>GitHub-модель: <strong>auto</strong></p>
  <p class="note">Эта чистая страница нужна для Android-иконки. Здесь меню Chrome должно работать спокойно: ⋮ → Добавить на главный экран.</p>
  <button class="primary" id="openClock" type="button">Открыть часы / Open Clock</button>
  <button class="secondary" id="backList" type="button">Вернуться к выбору моделей</button>
</div>
<script>
const target = "ClockViewerAndroid.html?model=auto";
document.getElementById("openClock").onclick = () => { window.location.href = target; };
document.getElementById("backList").onclick = () => { window.location.href = "ClockViewerAndroid.html"; };
function isStandaloneMode(){
  return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
}
if(isStandaloneMode()){
  setTimeout(() => { window.location.replace(target); }, 350);
}
</script>
</body>
</html>

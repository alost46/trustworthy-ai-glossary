<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Talking Clock 1.1</title>
<style>
:root{--bg:#0f172a;--fg:#f8fafc;--muted:#94a3b8;--panel:#fff;--text:#111827}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--fg);font-family:Arial,sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#app{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px}
#clockFace{width:min(92vw,620px);min-height:260px;border:2px solid rgba(255,255,255,.18);border-radius:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 18px 60px rgba(0,0,0,.35);background:radial-gradient(circle at top,rgba(56,189,248,.16),rgba(15,23,42,.94));cursor:pointer}
#time{font-size:clamp(64px,20vw,156px);line-height:1;font-weight:800;letter-spacing:.03em}
#date{margin-top:12px;font-size:clamp(18px,5vw,32px);color:var(--muted);text-align:center}
#hint{color:var(--muted);font-size:15px;text-align:center;line-height:1.45}
#settingsButton{position:fixed;right:16px;bottom:16px;width:58px;height:58px;border:none;border-radius:50%;background:#fff;color:#111827;font-size:28px;box-shadow:0 10px 30px rgba(0,0,0,.35);cursor:pointer}
#panelOverlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.72);padding:14px;z-index:50}
#panelOverlay.active{display:flex}
#panel{width:min(520px,96vw);max-height:90vh;overflow:auto;background:var(--panel);color:var(--text);border-radius:20px;padding:20px;box-shadow:0 20px 70px rgba(0,0,0,.45)}
#panel h2{margin:0 0 14px;font-size:24px}.control{margin:16px 0}label{display:block;font-weight:bold;margin-bottom:6px}select,input[type=range]{width:100%;padding:10px;font-size:16px}.row{display:grid;grid-template-columns:1fr;gap:10px}
button.action{width:100%;border:none;border-radius:12px;padding:12px;font-size:16px;font-weight:bold;cursor:pointer;background:#2563eb;color:white}button.secondary{background:#64748b}small{display:block;color:#64748b;line-height:1.35;margin-top:6px}#status{margin-top:10px;color:#475569;font-size:14px;min-height:20px}
#buildBadge{position:fixed;right:8px;top:8px;z-index:999;background:rgba(255,255,255,.86);color:#0f172a;border:1px solid #cbd5e1;border-radius:8px;padding:4px 7px;font:11px/1.25 Arial,sans-serif;pointer-events:none}
</style>
</head>
<body>
<div id="buildBadge">BUILD TALKING-CLOCK-1.1</div>
<div id="app">
  <div id="clockFace" aria-label="Говорящие часы">
    <div id="time">--:--</div>
    <div id="date">---</div>
  </div>
  <div id="hint">Короткое нажатие: сказать время.<br>Долгое нажатие: сказать дату.</div>
</div>
<button id="settingsButton" type="button" aria-label="Конструктор">⚙️</button>
<div id="panelOverlay">
  <div id="panel">
    <h2>⚙️ Конструктор говорящих часов 1.1</h2>
    <div class="control">
      <label for="languageSelect">Язык озвучивания</label>
      <select id="languageSelect">
        <option value="ru-RU">Русский</option>
        <option value="en-US">English</option>
        <option value="he-IL">עברית</option>
      </select>
      <small>Используется встроенный голос браузера/телефона. Если нужного голоса нет, устройство может заменить его ближайшим доступным.</small>
    </div>
    <div class="control">
      <label for="rateRange">Скорость речи: <span id="rateValue">1.0</span></label>
      <input type="range" id="rateRange" min="0.6" max="1.4" step="0.1" value="1.0">
    </div>
    <div class="row">
      <button class="action" id="testVoice" type="button">Проверить голос</button>
      <button class="action secondary" id="closePanel" type="button">Готово</button>
    </div>
    <div id="status"></div>
  </div>
</div>
<script>
const BUILD_ID="TALKING-CLOCK-1.1";
const SETTINGS_KEY="talking_clock_1_1_settings";
const clockFace=document.getElementById("clockFace");
const timeBox=document.getElementById("time");
const dateBox=document.getElementById("date");
const panelOverlay=document.getElementById("panelOverlay");
const settingsButton=document.getElementById("settingsButton");
const closePanel=document.getElementById("closePanel");
const languageSelect=document.getElementById("languageSelect");
const rateRange=document.getElementById("rateRange");
const rateValue=document.getElementById("rateValue");
const statusBox=document.getElementById("status");
const testVoice=document.getElementById("testVoice");
let longPressTimer=null;
let longPressFired=false;
function loadSettings(){try{const raw=localStorage.getItem(SETTINGS_KEY);if(!raw)return;const s=JSON.parse(raw);if(s.lang)languageSelect.value=s.lang;if(s.rate){rateRange.value=s.rate;rateValue.textContent=Number(s.rate).toFixed(1)}}catch(e){}}
function saveSettings(){localStorage.setItem(SETTINGS_KEY,JSON.stringify({lang:languageSelect.value,rate:Number(rateRange.value)}));}
function getLang(){return languageSelect.value||"ru-RU";}
function formatTimeForScreen(date){return new Intl.DateTimeFormat("ru-RU",{hour:"2-digit",minute:"2-digit",hour12:false}).format(date);}
function formatDateForScreen(date){return new Intl.DateTimeFormat(getLang(),{weekday:"long",day:"numeric",month:"long",year:"numeric"}).format(date);}
function updateClock(){const now=new Date();timeBox.textContent=formatTimeForScreen(now);dateBox.textContent=formatDateForScreen(now);}
function getTimeSpeech(date,lang){if(lang==="en-US")return "The time is "+new Intl.DateTimeFormat("en-US",{hour:"numeric",minute:"2-digit"}).format(date);if(lang==="he-IL")return "השעה "+new Intl.DateTimeFormat("he-IL",{hour:"numeric",minute:"2-digit"}).format(date);return "Сейчас "+new Intl.DateTimeFormat("ru-RU",{hour:"numeric",minute:"2-digit"}).format(date);}
function getDateSpeech(date,lang){if(lang==="en-US")return "Today is "+new Intl.DateTimeFormat("en-US",{weekday:"long",day:"numeric",month:"long",year:"numeric"}).format(date);if(lang==="he-IL")return "היום "+new Intl.DateTimeFormat("he-IL",{weekday:"long",day:"numeric",month:"long",year:"numeric"}).format(date);return "Сегодня "+new Intl.DateTimeFormat("ru-RU",{weekday:"long",day:"numeric",month:"long",year:"numeric"}).format(date);}
function chooseVoice(lang){const voices=window.speechSynthesis?speechSynthesis.getVoices():[];return voices.find(v=>v.lang===lang)||voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith(lang.slice(0,2).toLowerCase()))||null;}
function speak(text){if(!("speechSynthesis" in window)){statusBox.textContent="На этом устройстве speechSynthesis недоступен.";return;}speechSynthesis.cancel();const lang=getLang();const u=new SpeechSynthesisUtterance(text);u.lang=lang;u.rate=Number(rateRange.value)||1;const voice=chooseVoice(lang);if(voice)u.voice=voice;speechSynthesis.speak(u);}
function speakTime(){speak(getTimeSpeech(new Date(),getLang()));}
function speakDate(){speak(getDateSpeech(new Date(),getLang()));}
function startPress(e){e.preventDefault();longPressFired=false;clearTimeout(longPressTimer);longPressTimer=setTimeout(()=>{longPressFired=true;speakDate();},750);}
function endPress(e){e.preventDefault();clearTimeout(longPressTimer);if(!longPressFired)speakTime();}
clockFace.addEventListener("pointerdown",startPress);
clockFace.addEventListener("pointerup",endPress);
clockFace.addEventListener("pointercancel",()=>clearTimeout(longPressTimer));
clockFace.addEventListener("pointerleave",()=>clearTimeout(longPressTimer));
settingsButton.onclick=()=>panelOverlay.classList.add("active");
closePanel.onclick=()=>panelOverlay.classList.remove("active");
languageSelect.onchange=()=>{saveSettings();updateClock();statusBox.textContent="Язык сохранён: "+languageSelect.options[languageSelect.selectedIndex].text;};
rateRange.oninput=()=>{rateValue.textContent=Number(rateRange.value).toFixed(1);saveSettings();};
testVoice.onclick=()=>{const lang=getLang();if(lang==="en-US")speak("Talking clock is ready.");else if(lang==="he-IL")speak("השעון המדבר מוכן.");else speak("Говорящие часы готовы.");};
if("speechSynthesis" in window){speechSynthesis.onvoiceschanged=()=>{};}
loadSettings();updateClock();setInterval(updateClock,1000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Talking Clock">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Talking Clock 1.4e</title>
<style>
:root{--bg:#0f172a;--fg:#f8fafc;--muted:#94a3b8;--panel:#fff;--text:#111827;--clock-scale:1}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--fg);font-family:Arial,sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#app{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(8px,2vh,18px);padding:clamp(6px,2vw,20px)}
#clockFace{width:min(98vw,calc(780px * var(--clock-scale)));height:min(82vh,calc(340px * var(--clock-scale)));min-height:180px;border:2px solid rgba(255,255,255,.18);border-radius:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 18px 60px rgba(0,0,0,.35);background:radial-gradient(circle at top,rgba(56,189,248,.16),rgba(15,23,42,.94));cursor:pointer;padding:clamp(8px,2vw,20px)}
#time{font-size:min(40vw,calc(190px * var(--clock-scale)));line-height:.95;font-weight:800;letter-spacing:.03em;white-space:nowrap}
#date{margin-top:12px;font-size:min(8vw,calc(36px * var(--clock-scale)));color:var(--muted);text-align:center;max-width:94vw}
#hint{color:var(--muted);font-size:15px;text-align:center;line-height:1.45}
#settingsButton,#fullscreenButton{position:fixed;bottom:16px;width:58px;height:58px;border:none;border-radius:50%;background:#fff;color:#111827;font-size:28px;box-shadow:0 10px 30px rgba(0,0,0,.35);cursor:pointer}
#settingsButton{right:16px}#fullscreenButton{left:16px}
#panelOverlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.72);padding:14px;z-index:50}
#panelOverlay.active{display:flex}
#panel{width:min(560px,96vw);max-height:90vh;overflow:auto;background:var(--panel);color:var(--text);border-radius:20px;padding:20px;box-shadow:0 20px 70px rgba(0,0,0,.45);user-select:text;-webkit-user-select:text}
#panel h2{margin:0 0 14px;font-size:24px}.control{margin:16px 0}label{display:block;font-weight:bold;margin-bottom:6px}select,input[type=range]{width:100%;padding:10px;font-size:16px}.scale-marks{display:flex;justify-content:space-between;color:#64748b;font-size:12px;margin-top:4px}.row{display:grid;grid-template-columns:1fr;gap:10px}button.action{width:100%;border:none;border-radius:12px;padding:12px;font-size:16px;font-weight:bold;cursor:pointer;background:#2563eb;color:white}button.secondary{background:#64748b}button.warn{background:#b45309}small{display:block;color:#64748b;line-height:1.35;margin-top:6px}#status{margin-top:10px;color:#475569;font-size:14px;min-height:20px;white-space:pre-wrap}#installPanel,#voicesPanel{display:none;margin-top:10px;padding:10px;border:1px solid #cbd5e1;border-radius:10px;background:#f8fafc;color:#111827;font-size:14px;line-height:1.35;user-select:text;-webkit-user-select:text}#installPanel.active,#voicesPanel.active{display:block}#voicesPanel{white-space:pre-wrap;max-height:280px;overflow:auto;font:13px/1.35 Consolas,Menlo,monospace}#buildBadge{position:fixed;right:8px;top:8px;z-index:999;background:rgba(255,255,255,.86);color:#0f172a;border:1px solid #cbd5e1;border-radius:8px;padding:4px 7px;font:11px/1.25 Arial,sans-serif;pointer-events:none}
</style>
</head>
<body>
<div id="buildBadge">BUILD TALKING-CLOCK-1.4e</div>
<div id="app"><div id="clockFace" aria-label="Говорящие часы"><div id="time">--:--</div><div id="date">---</div></div><div id="hint">Короткое нажатие: сказать время.<br>Долгое нажатие: сказать дату.</div></div>
<button id="fullscreenButton" type="button" aria-label="Full screen">⛶</button><button id="settingsButton" type="button" aria-label="Конструктор">⚙️</button>
<div id="panelOverlay"><div id="panel"><h2 id="panelTitle">⚙️ Конструктор говорящих часов</h2>
<div class="control"><label for="languageSelect">Язык озвучивания</label><select id="languageSelect">
<option value="ru-RU">Русский</option><option value="en-US">English</option><option value="he-IL">עברית</option><option value="de-DE">Deutsch</option><option value="fr-FR">Français</option><option value="es-ES">Español</option><option value="ar-SA">العربية</option><option value="am-ET">አማርኛ</option>
</select><small>Если голос не найден, устройство может молчать или подставить другой голос.</small></div>
<div class="control"><label for="digitsSelect">Цифры на экране</label><select id="digitsSelect"><option value="auto">Как выберет браузер</option><option value="latn">Обычные 0-9</option><option value="arab">Арабские ٠١٢٣٤٥٦٧٨٩</option><option value="arabext">Восточно-арабские ۰۱۲۳۴۵۶۷۸۹</option><option value="ethi">Эфиопские ፩፪፫፬፭፮፯፰፱</option></select><small>Это только отображение цифр. Голос проверяется отдельно.</small></div>
<div class="control"><label id="sizeLabel" for="sizeRange">Размер циферблата: <span id="sizeValue">100%</span></label><input type="range" id="sizeRange" min="50" max="200" step="5" value="100"><div class="scale-marks"><span>50%</span><span>100%</span><span>150%</span><span>200%</span></div></div>
<div class="control"><label id="rateLabel" for="rateRange">Скорость речи: <span id="rateValue">1.0</span></label><input type="range" id="rateRange" min="0.6" max="1.4" step="0.1" value="1.0"></div>
<div class="row"><button class="action" id="testVoice" type="button">Проверить выбранный голос</button><button class="action warn" id="nextLanguageTest" type="button">Тест языков: следующий</button><button class="action secondary" id="showAllVoicesButton" type="button">Полный список голосов</button><button class="action secondary" id="testDigitsButton" type="button">Тест цифр</button><button class="action secondary" id="createIconButton" type="button">Создать иконку</button><button class="action secondary" id="closePanel" type="button">Готово</button><div id="installPanel"></div><div id="voicesPanel"></div></div><div id="status"></div></div></div>
<script>
const BUILD_ID="TALKING-CLOCK-1.4e-ANDROID-SAFE-DIAGNOSTICS";
const SETTINGS_KEY="talking_clock_1_4e_settings";
const LANGS=["ru-RU","en-US","he-IL","de-DE","fr-FR","es-ES","ar-SA","am-ET"];
const LABELS={"ru-RU":"Русский","en-US":"English","he-IL":"עברית","de-DE":"Deutsch","fr-FR":"Français","es-ES":"Español","ar-SA":"العربية","am-ET":"አማርኛ"};
const clockFace=document.getElementById("clockFace"),timeBox=document.getElementById("time"),dateBox=document.getElementById("date"),hintBox=document.getElementById("hint"),panelOverlay=document.getElementById("panelOverlay"),settingsButton=document.getElementById("settingsButton"),fullscreenButton=document.getElementById("fullscreenButton"),closePanel=document.getElementById("closePanel"),languageSelect=document.getElementById("languageSelect"),digitsSelect=document.getElementById("digitsSelect"),rateRange=document.getElementById("rateRange"),rateValue=document.getElementById("rateValue"),sizeRange=document.getElementById("sizeRange"),sizeValue=document.getElementById("sizeValue"),statusBox=document.getElementById("status"),voicesPanel=document.getElementById("voicesPanel"),installPanel=document.getElementById("installPanel"),testVoice=document.getElementById("testVoice"),nextLanguageTest=document.getElementById("nextLanguageTest"),showAllVoicesButton=document.getElementById("showAllVoicesButton"),testDigitsButton=document.getElementById("testDigitsButton"),createIconButton=document.getElementById("createIconButton");
let longPressTimer=null,longPressFired=false,deferredInstallPrompt=null,nextIndex=0;
function getLang(){return languageSelect.value||"ru-RU"}function getDigits(){return digitsSelect.value||"auto"}
function displayLocale(lang){const nu=getDigits();if(nu==="auto")return lang;try{return new Intl.Locale(lang,{numberingSystem:nu}).toString()}catch(e){return lang+"-u-nu-"+nu}}
function saveSettings(){localStorage.setItem(SETTINGS_KEY,JSON.stringify({lang:getLang(),digits:getDigits(),rate:Number(rateRange.value),size:Number(sizeRange.value)}))}
function loadSettings(){try{const s=JSON.parse(localStorage.getItem(SETTINGS_KEY)||"{}");if(s.lang)languageSelect.value=s.lang;if(s.digits)digitsSelect.value=s.digits;if(s.rate){rateRange.value=s.rate;rateValue.textContent=Number(s.rate).toFixed(1)}if(s.size){sizeRange.value=s.size;sizeValue.textContent=Number(s.size)+"%";applyClockSize(s.size)}}catch(e){}}
function applyClockSize(size){document.documentElement.style.setProperty("--clock-scale",String((Number(size)||100)/100))}
function applyUi(){const lang=getLang();document.documentElement.lang=lang.slice(0,2);document.documentElement.dir=(lang==="he-IL"||lang.startsWith("ar"))?"rtl":"ltr";hintBox.innerHTML=(lang==="en-US")?"Short tap: say the time.<br>Long press: say the date.":(lang==="he-IL")?"לחיצה קצרה: אמירת השעה.<br>לחיצה ארוכה: אמירת התאריך.":"Короткое нажатие: сказать время.<br>Долгое нажатие: сказать дату."}
function fmtTime(date,lang=getLang()){return new Intl.DateTimeFormat(displayLocale(lang),{hour:"2-digit",minute:"2-digit",hour12:false}).format(date)}
function fmtDate(date,lang=getLang()){return new Intl.DateTimeFormat(displayLocale(lang),{weekday:"long",day:"numeric",month:"long",year:"numeric"}).format(date)}
function updateClock(){const now=new Date();timeBox.textContent=fmtTime(now);dateBox.textContent=fmtDate(now)}
function getVoices(){return ("speechSynthesis" in window)?speechSynthesis.getVoices()||[]:[]}
function chooseVoice(lang){const voices=getVoices(),lc=lang.toLowerCase(),base=lang.slice(0,2).toLowerCase();return voices.find(v=>(v.lang||"").toLowerCase()===lc)||voices.find(v=>(v.lang||"").toLowerCase().startsWith(base))||null}
function voiceLine(lang){const voices=getVoices();const base=lang.slice(0,2).toLowerCase();const same=voices.filter(v=>(v.lang||"").toLowerCase().startsWith(base));const v=chooseVoice(lang);return `${LABELS[lang]||lang} ${lang}: voices=${same.length}; selected=${v?`${v.name} [${v.lang}] ${v.localService?"local":"remote"}`:"NO VOICE"}`}
function speechText(lang){const t=new Intl.DateTimeFormat(lang,{hour:"numeric",minute:"2-digit"}).format(new Date());if(lang==="en-US")return "Talking clock test. The time is "+t;if(lang==="he-IL")return "בדיקת השעון המדבר. השעה "+t;if(lang==="de-DE")return "Test der sprechenden Uhr. Es ist "+t;if(lang==="fr-FR")return "Test de l’horloge parlante. Il est "+t;if(lang==="es-ES")return "Prueba del reloj parlante. Son las "+t;if(lang==="ar-SA")return "اختبار الساعة الناطقة. الساعة "+t;if(lang==="am-ET")return "የሚናገር ሰዓት ሙከራ። ሰዓቱ "+t;return "Проверка говорящих часов. Сейчас "+t}
function speak(text,lang=getLang()){
 if(!("speechSynthesis" in window)){statusBox.textContent="speechSynthesis недоступен";return}
 speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=lang;u.rate=Number(rateRange.value)||1;const v=chooseVoice(lang);if(v)u.voice=v;
 voicesPanel.classList.add("active");voicesPanel.textContent="Диагностика выбранного голоса:\n"+voiceLine(lang)+"\n\nТекст:\n"+text;
 statusBox.textContent="Пробую говорить: "+voiceLine(lang);
 u.onstart=()=>statusBox.textContent="Говорит: "+LABELS[lang]+" / "+lang;
 u.onend=()=>statusBox.textContent="Готово: "+LABELS[lang]+" / "+lang;
 u.onerror=e=>statusBox.textContent="Ошибка речи: "+(e.error||"unknown")+"\n"+voiceLine(lang);
 speechSynthesis.speak(u);
 setTimeout(()=>{if(!speechSynthesis.speaking&&!speechSynthesis.pending)statusBox.textContent="Речь не стартовала. "+voiceLine(lang)},1200)
}
function speakTime(){speak((getLang()==="en-US"?"The time is ":getLang()==="he-IL"?"השעה ":getLang()==="de-DE"?"Es ist ":getLang()==="fr-FR"?"Il est ":getLang()==="es-ES"?"Son las ":getLang()==="ar-SA"?"الساعة ":getLang()==="am-ET"?"ሰዓቱ ":"Сейчас ")+new Intl.DateTimeFormat(getLang(),{hour:"numeric",minute:"2-digit"}).format(new Date()),getLang())}
function speakDate(){speak((getLang()==="en-US"?"Today is ":getLang()==="he-IL"?"היום ":getLang()==="de-DE"?"Heute ist ":getLang()==="fr-FR"?"Nous sommes le ":getLang()==="es-ES"?"Hoy es ":getLang()==="ar-SA"?"اليوم ":getLang()==="am-ET"?"ዛሬ ":"Сегодня ")+new Intl.DateTimeFormat(getLang(),{weekday:"long",day:"numeric",month:"long",year:"numeric"}).format(new Date()),getLang())}
function startPress(e){e.preventDefault();longPressFired=false;clearTimeout(longPressTimer);longPressTimer=setTimeout(()=>{longPressFired=true;speakDate()},750)}function endPress(e){e.preventDefault();clearTimeout(longPressTimer);if(!longPressFired)speakTime()}
clockFace.addEventListener("pointerdown",startPress);clockFace.addEventListener("pointerup",endPress);clockFace.addEventListener("pointercancel",()=>clearTimeout(longPressTimer));clockFace.addEventListener("pointerleave",()=>clearTimeout(longPressTimer));
function listAllVoices(){const voices=getVoices();const lines=["BUILD: "+BUILD_ID,"speechSynthesis: "+(("speechSynthesis" in window)?"YES":"NO"),"total voices: "+voices.length,"","Проверяемые языки:",...LANGS.map(voiceLine),"","Полный список голосов устройства:"];if(!voices.length)lines.push("Голоса пока не загружены. Нажмите Проверить выбранный голос, подождите 2 секунды и откройте список снова.");else voices.slice().sort((a,b)=>(a.lang+a.name).localeCompare(b.lang+b.name)).forEach((v,i)=>lines.push(`${i+1}. ${v.lang||"?"} | ${v.name} | ${v.localService?"local":"remote"} | default=${!!v.default}`));voicesPanel.classList.add("active");voicesPanel.textContent=lines.join("\n")}
function nextTest(){const lang=LANGS[nextIndex%LANGS.length];nextIndex++;languageSelect.value=lang;applyUi();updateClock();saveSettings();speak(speechText(lang),lang);nextLanguageTest.textContent="Тест языков: следующий (последний: "+(LABELS[lang]||lang)+")"}
function testDigits(){const nums=["auto","latn","arab","arabext","ethi"],now=new Date(),old=getDigits(),lines=["Тест цифр этого устройства:"];for(const lang of LANGS){for(const nu of nums){digitsSelect.value=nu;let sample;try{sample=new Intl.DateTimeFormat(displayLocale(lang),{hour:"2-digit",minute:"2-digit",day:"numeric",month:"long",year:"numeric",hour12:false}).format(now)}catch(e){sample="ERROR: "+e.message}lines.push(`${lang} / ${nu} -> ${sample}`)}lines.push("")}digitsSelect.value=old;voicesPanel.classList.add("active");voicesPanel.textContent=lines.join("\n");updateClock()}
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredInstallPrompt=e});window.addEventListener("appinstalled",()=>{deferredInstallPrompt=null;installPanel.classList.add("active");installPanel.textContent="Иконка создана."});async function createIcon(){saveSettings();installPanel.classList.add("active");if(deferredInstallPrompt){const p=deferredInstallPrompt;deferredInstallPrompt=null;installPanel.textContent="Открываю системное окно установки...";try{p.prompt();const c=await p.userChoice;installPanel.textContent="Результат: "+(c&&c.outcome?c.outcome:"OK")}catch(e){installPanel.textContent="Системное окно не открылось."}}else{installPanel.textContent=/iPad|iPhone|iPod/.test(navigator.userAgent)?"iPhone: Поделиться → На экран Домой.":"Android: меню браузера ⋮ → Добавить на главный экран / Установить приложение."}}
async function toggleFullscreen(){try{if(document.fullscreenElement)await document.exitFullscreen();else if(document.documentElement.requestFullscreen)await document.documentElement.requestFullscreen()}catch(e){statusBox.textContent="Полноэкранный режим недоступен."}}
settingsButton.onclick=()=>panelOverlay.classList.add("active");closePanel.onclick=()=>panelOverlay.classList.remove("active");fullscreenButton.onclick=toggleFullscreen;testVoice.onclick=()=>speak(speechText(getLang()),getLang());nextLanguageTest.onclick=nextTest;showAllVoicesButton.onclick=listAllVoices;testDigitsButton.onclick=testDigits;createIconButton.onclick=createIcon;
languageSelect.onchange=()=>{applyUi();updateClock();saveSettings();statusBox.textContent="Язык выбран: "+LABELS[getLang()]};digitsSelect.onchange=()=>{updateClock();saveSettings();statusBox.textContent="Цифры выбраны: "+getDigits()};rateRange.oninput=()=>{rateValue.textContent=Number(rateRange.value).toFixed(1);saveSettings()};sizeRange.oninput=()=>{sizeValue.textContent=Number(sizeRange.value)+"%";applyClockSize(sizeRange.value);saveSettings()};
if("speechSynthesis" in window){speechSynthesis.onvoiceschanged=()=>{if(voicesPanel.classList.contains("active"))listAllVoices()}}
loadSettings();applyUi();updateClock();setInterval(updateClock,1000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Глоссарий Trustworthy AI</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d7ddea;
      --line-dark: #bcc7dd;
      --text: #1f2a44;
      --muted: #60708f;
      --accent: #2f6fed;
      --accent-soft: #eaf1ff;
      --highlight: #fff4c2;
      --danger: #b52b27;
      --shadow: 0 8px 22px rgba(31, 42, 68, 0.08);
      --radius: 14px;
      --header-h: 52px;
      --table-h: 68vh;
      --results-h: calc(var(--table-h) + 84px);
      --font: "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 18px;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }

    h1 {
      margin: 0 0 14px 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .page {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .top-controls {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .search-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }

    .search-input-wrap {
      display: flex;
      gap: 10px;
      align-items: center;
      position: relative;
    }

    #searchInput {
      width: 100%;
      min-height: 44px;
      padding: 10px 40px 10px 14px;
      border: 1px solid var(--line-dark);
      border-radius: 12px;
      outline: none;
      font-size: 16px;
      background: #fff;
      color: var(--text);
    }

    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 111, 237, 0.12);
    }

    .clear-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: none;
      padding: 0;
    }

    .clear-btn:hover {
      color: var(--accent);
    }

    .search-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      font-size: 13px;
      color: var(--muted);
    }

    .service-message {
      min-height: 20px;
      font-size: 14px;
      color: var(--danger);
      font-weight: 700;
    }

    .suggestions-wrap {
      position: relative;
    }

    .suggestions {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      max-height: 280px;
      overflow: auto;
      display: none;
    }

    .suggestions.visible {
      display: block;
    }

    .suggestion-item {
      padding: 10px 12px;
      border-bottom: 1px solid #eef2fa;
      cursor: pointer;
    }

    .suggestion-item:last-child {
      border-bottom: 0;
    }

    .suggestion-item:hover {
      background: #f8fbff;
    }

    .suggestion-item.active {
      background: #eef5ff;
      border-left: 3px solid var(--accent);
      padding-left: 9px;
    }

    .suggestion-top {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      white-space: pre-line;
      line-height: 1.35;
    }

    .suggestion-bottom {
      margin-top: 5px;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      white-space: pre-line;
      line-height: 1.35;
    }

    .alphabet-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .alphabet-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .alphabet-label {
      width: 88px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      flex: 0 0 auto;
    }

    .alphabet-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .alpha-btn {
      min-width: 32px;
      height: 32px;
      border: 1px solid var(--line-dark);
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
    }

    .alpha-btn:hover {
      background: #f8fbff;
      border-color: var(--accent);
    }

    .alpha-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(220px, 1fr) minmax(520px, 2.2fr) minmax(260px, 320px);
      gap: 14px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 0;
    }

    .panel-header {
      min-height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcff;
      font-weight: 700;
      gap: 8px;
    }

    .panel-header small {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .table-wrap {
      height: var(--table-h);
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #f7faff;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 10px 12px;
      text-align: left;
    }

    tbody td {
      border-bottom: 1px solid #eef2fa;
      padding: 10px 12px;
      vertical-align: top;
      font-size: 14px;
    }

    .clickable-row {
      cursor: pointer;
    }

    .clickable-row:hover {
      background: #f8fbff;
    }

    .selected-row {
      background: var(--highlight) !important;
      transition: background 0.2s ease;
    }

    .term-main {
      font-weight: 800;
      font-size: 14px;
      white-space: pre-line;
      line-height: 1.35;
    }

    .term-sub {
      margin-top: 4px;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      white-space: pre-line;
      line-height: 1.3;
    }

    .card-term {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 10px;
      white-space: pre-line;
      line-height: 1.35;
    }

    .primary-translation {
      font-size: 20px;
      font-weight: 800;
      white-space: pre-line;
      line-height: 1.35;
      color: var(--text);
    }

    .card-section {
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .card-label {
      font-weight: 700;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
      text-transform: uppercase;
      font-size: 12px;
    }

    .card-value {
      white-space: pre-line;
    }

    .definition-block {
      border: 1px solid #e7edf9;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
      background: #fbfcff;
    }

    .definition-line {
      white-space: pre-line;
    }

    .definition-gap {
      height: 10px;
    }

    .related-links {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .related-link {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #f2f6ff;
      border: 1px solid #d7e4ff;
      font-size: 12px;
      cursor: pointer;
      color: var(--accent);
      text-decoration: none;
    }

    .related-link:hover {
      background: #eaf1ff;
    }

    .results-wrap {
      height: var(--results-h);
      overflow: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fcfdff;
    }

    .results-empty {
      color: var(--muted);
      font-size: 14px;
      padding: 8px;
      line-height: 1.4;
    }

    .result-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px 12px;
      cursor: pointer;
    }

    .result-card:hover {
      border-color: var(--accent);
      background: #f8fbff;
    }

    .result-card.active {
      border-color: var(--accent);
      background: #eef5ff;
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    .result-title {
      font-weight: 800;
      font-size: 14px;
      line-height: 1.35;
      white-space: pre-line;
    }

    .result-sub {
      margin-top: 5px;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      white-space: pre-line;
      line-height: 1.35;
    }

    .mode-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef3ff;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #d5e2ff;
    }

    @media (max-width: 1450px) {
      .layout {
        grid-template-columns: 1fr 1fr;
      }

      .results-panel {
        grid-column: span 2;
      }
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .results-panel {
        grid-column: auto;
      }

      .alphabet-label {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Глоссарий Trustworthy AI</h1>

    <section class="top-controls">
      <div class="search-row">
        <div class="search-input-wrap">
          <input
            id="searchInput"
            type="text"
            placeholder="Поиск по английским и русским терминам"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="clearBtn" class="clear-btn" type="button" aria-label="Очистить поиск">×</button>
        </div>

        <div class="search-meta">
          <div>Режим поиска: <strong id="searchModeLabel">пусто</strong></div>
          <div>Последний успешный префикс: <strong id="lastPrefixLabel">—</strong></div>
        </div>

        <div id="serviceMessage" class="service-message"></div>

        <div class="suggestions-wrap">
          <div id="searchSuggestions" class="suggestions"></div>
        </div>

        <div class="alphabet-block">
          <div class="alphabet-row">
            <div class="alphabet-label">Английские буквы</div>
            <div id="enAlphabet" class="alphabet-buttons"></div>
          </div>
          <div class="alphabet-row">
            <div class="alphabet-label">Русские буквы</div>
            <div id="ruAlphabet" class="alphabet-buttons"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="layout">
      <div class="panel">
        <div class="panel-header">
          <span>Английские термины</span>
          <small id="enCount"></small>
        </div>
        <div class="table-wrap">
          <table id="enTable">
            <thead>
              <tr>
                <th>Английский</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span>Русские термины</span>
          <small id="ruCount"></small>
        </div>
        <div class="table-wrap">
          <table id="ruTable">
            <thead>
              <tr>
                <th>Русский</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span>Карточки терминов</span>
          <small id="cardsCount"></small>
        </div>
        <div class="table-wrap" id="cardsWrap">
          <table id="cardsTable">
            <thead>
              <tr>
                <th>Карточка</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="panel results-panel">
        <div class="panel-header">
          <span>Результаты поиска</span>
          <span class="mode-badge" id="resultsModeBadge">пусто</span>
        </div>
        <div id="resultsPanel" class="results-wrap"></div>
      </div>
    </section>
  </div>

  <script>
    const EN_LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    const RU_LETTERS = "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ".split("");

    const MODE_LABELS = {
      empty: "пусто",
      search: "поиск",
      alphabet: "буква"
    };

    const appState = {
      rawData: [],
      normalizedData: [],
      tableState: {
        selectedId: null
      },
      searchState: {
        input: "",
        language: null,
        suggestions: [],
        lastSuccessfulPrefix: "",
        lastSuccessfulResults: []
      },
      alphabetState: {
        activePanel: null,
        selectedLetter: "",
        results: []
      },
      resultsPanelState: {
        mode: "empty",
        items: []
      }
    };

    const elements = {
      searchInput: document.getElementById("searchInput"),
      clearBtn: document.getElementById("clearBtn"),
      serviceMessage: document.getElementById("serviceMessage"),
      searchSuggestions: document.getElementById("searchSuggestions"),
      searchModeLabel: document.getElementById("searchModeLabel"),
      lastPrefixLabel: document.getElementById("lastPrefixLabel"),
      enAlphabet: document.getElementById("enAlphabet"),
      ruAlphabet: document.getElementById("ruAlphabet"),
      enTableBody: document.querySelector("#enTable tbody"),
      ruTableBody: document.querySelector("#ruTable tbody"),
      cardsTableBody: document.querySelector("#cardsTable tbody"),
      cardsWrap: document.getElementById("cardsWrap"),
      resultsPanel: document.getElementById("resultsPanel"),
      resultsModeBadge: document.getElementById("resultsModeBadge"),
      enCount: document.getElementById("enCount"),
      ruCount: document.getElementById("ruCount"),
      cardsCount: document.getElementById("cardsCount")
    };

    function normalizeSearchText(text) {
      return String(text || "").trim().toLowerCase();
    }

    function detectLanguage(text) {
      if (!text) return null;
      const first = text.trim().charAt(0);
      if (!first) return null;
      if (/[A-Za-z]/.test(first)) return "en";
      if (/[А-Яа-яЁё]/.test(first)) return "ru";
      return null;
    }

    function splitTranslationLines(text) {
      const value = String(text || "").trim();
      if (!value) return "";
      return value.replace(/\s*\(([^()]*)\)\s*/g, "\n$1").trim();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function readText(value) {
      if (value == null) return "";

      if (typeof value === "string" || typeof value === "number") {
        return String(value).trim();
      }

      if (Array.isArray(value)) {
        return value
          .map(part => {
            if (part == null) return "";
            if (typeof part === "string" || typeof part === "number") {
              return String(part).trim();
            }
            if (typeof part === "object" && "text" in part) {
              return String(part.text || "").trim();
            }
            return "";
          })
          .filter(Boolean)
          .join(" ")
          .trim();
      }

      if (typeof value === "object") {
        if ("text" in value) return String(value.text || "").trim();
        if ("value" in value) return String(value.value || "").trim();
      }

      return "";
    }

    function getPrimaryRussian(item) {
      return readText(item.term_ru_primary || item.term_ru || "");
    }

    function getEnglish(item) {
      return readText(item.term_en || "");
    }

    function getVisibleTop(item, language) {
      return language === "ru" ? splitTranslationLines(getPrimaryRussian(item)) : getEnglish(item);
    }

    function getVisibleBottom(item, language) {
      return language === "ru" ? getEnglish(item) : splitTranslationLines(getPrimaryRussian(item));
    }

    function toClickableEntry(item, language) {
      return {
        id: item._id,
        top: getVisibleTop(item, language),
        bottom: getVisibleBottom(item, language)
      };
    }

    function buildNormalizedData(data) {
      return data.map((item, index) => {
        const clone = { ...item };
        clone._id = item.id ?? item.term_id ?? `row_${index}`;
        clone._en = getEnglish(item);
        clone._ruPrimary = getPrimaryRussian(item);
        clone._enNorm = normalizeSearchText(clone._en);
        clone._ruNorm = normalizeSearchText(clone._ruPrimary);
        return clone;
      });
    }

    function getSortedEnglishData() {
      return [...appState.normalizedData].sort((a, b) =>
        a._en.localeCompare(b._en, "en", { sensitivity: "base" })
      );
    }

    function getSortedRussianData() {
      return [...appState.normalizedData].sort((a, b) =>
        a._ruPrimary.localeCompare(b._ruPrimary, "ru", { sensitivity: "base" })
      );
    }

    function getSortedCardsData() {
      return [...appState.normalizedData].sort((a, b) =>
        a._en.localeCompare(b._en, "en", { sensitivity: "base" })
      );
    }

    function setModeLabels(mode) {
      elements.searchModeLabel.textContent = MODE_LABELS[mode] || mode || "пусто";
      elements.resultsModeBadge.textContent = MODE_LABELS[mode] || mode || "пусто";
    }

    function updateClearButton() {
      elements.clearBtn.style.display = elements.searchInput.value ? "block" : "none";
    }

    async function loadData() {
      renderAlphabets();
      renderResultsPanel();
      updateCounters();
      updateClearButton();

      const possibleFiles = [
        "terms_full_clean.json",
        "glossary.json",
        "data.json"
      ];

      let loaded = null;
      let lastError = null;

      for (const file of possibleFiles) {
        try {
          const response = await fetch(file, { cache: "no-store" });
          if (!response.ok) continue;
          const json = await response.json();
          loaded = Array.isArray(json) ? json : (Array.isArray(json.terms) ? json.terms : null);
          if (loaded) break;
        } catch (error) {
          lastError = error;
        }
      }

      if (!loaded) {
        console.error("Data load failed", lastError);
        elements.serviceMessage.textContent = "Не удалось загрузить JSON глоссария.";
        renderTables();
        return;
      }

      appState.rawData = loaded;
      appState.normalizedData = buildNormalizedData(loaded);

      renderTables();
      renderResultsPanel();
      updateCounters();
    }

    function renderAlphabets() {
      elements.enAlphabet.innerHTML = EN_LETTERS.map(letter => {
        return `<button class="alpha-btn" type="button" data-panel="en" data-letter="${letter}">${letter}</button>`;
      }).join("");

      elements.ruAlphabet.innerHTML = RU_LETTERS.map(letter => {
        return `<button class="alpha-btn" type="button" data-panel="ru" data-letter="${letter}">${letter}</button>`;
      }).join("");

      [...elements.enAlphabet.querySelectorAll(".alpha-btn"), ...elements.ruAlphabet.querySelectorAll(".alpha-btn")]
        .forEach(btn => {
          btn.addEventListener("click", () => {
            handleAlphabetClick(btn.dataset.panel, btn.dataset.letter);
          });
        });
    }

    function renderTables() {
      renderEnTable();
      renderRuTable();
      renderCardsTable();
      updateCounters();
    }

    function renderEnTable() {
      const sorted = getSortedEnglishData();

      elements.enTableBody.innerHTML = sorted.map(item => {
        return `
          <tr class="clickable-row" data-id="${escapeHtml(item._id)}">
            <td>
              <div class="term-main">${escapeHtml(item._en)}</div>
              <div class="term-sub">${escapeHtml(splitTranslationLines(item._ruPrimary))}</div>
            </td>
          </tr>
        `;
      }).join("");

      elements.enTableBody.querySelectorAll("tr").forEach(row => {
        row.addEventListener("click", () => {
          selectCardOnly(row.dataset.id, true);
        });
      });
    }

    function renderRuTable() {
      const sorted = getSortedRussianData();

      elements.ruTableBody.innerHTML = sorted.map(item => {
        return `
          <tr class="clickable-row" data-id="${escapeHtml(item._id)}">
            <td>
              <div class="term-main">${escapeHtml(splitTranslationLines(item._ruPrimary))}</div>
              <div class="term-sub">${escapeHtml(item._en)}</div>
            </td>
          </tr>
        `;
      }).join("");

      elements.ruTableBody.querySelectorAll("tr").forEach(row => {
        row.addEventListener("click", () => {
          selectCardOnly(row.dataset.id, true);
        });
      });
    }

    function buildDefinitionsHtml(item) {
      const defs = Array.isArray(item.definitions) ? item.definitions : [];

      if (!defs.length) {
        return "";
      }

      return defs.map((def, index) => {
        const defEn = readText(def?.en);
        const defRu = readText(def?.ru);
        const citation = readText(def?.citation);

        return `
          <div class="definition-block">
            <span class="card-label">Определение ${index + 1}</span>
            ${defRu ? `<div class="definition-line"><strong>RU:</strong> ${escapeHtml(defRu)}</div>` : ""}
            ${(defRu && defEn) ? `<div class="definition-gap"></div>` : ""}
            ${defEn ? `<div class="definition-line"><strong>EN:</strong> ${escapeHtml(defEn)}</div>` : ""}
            ${citation ? `<div class="card-value"><strong>Источник:</strong> ${escapeHtml(citation)}</div>` : ""}
          </div>
        `;
      }).join("");
    }

    function buildRelatedTermsHtml(relatedTerms) {
      if (!Array.isArray(relatedTerms) || !relatedTerms.length) {
        return "";
      }

      return relatedTerms.map(part => {
        if (typeof part === "string") {
          const label = readText(part);
          if (!label) return "";
          return `<a href="#" class="related-link" data-related="${escapeHtml(label)}">${escapeHtml(label)}</a>`;
        }

        const en = readText(part?.en);
        const ru = readText(part?.ru);
        const label = en && ru ? `${en} / ${ru}` : (en || ru);

        if (!label) return "";

        return `<a href="#" class="related-link" data-related="${escapeHtml(en || ru)}">${escapeHtml(label)}</a>`;
      }).filter(Boolean).join("");
    }

    function buildCardHtml(item) {
      const definitionsHtml = buildDefinitionsHtml(item);
      const relatedHtml = buildRelatedTermsHtml(item.related_terms);
      const legalDefinition = readText(item.legal_definition || "");

      return `
        <div class="card-term">${escapeHtml(item._en)}</div>

        <div class="card-section">
          <span class="card-label">Русский</span>
          <div class="primary-translation">${escapeHtml(splitTranslationLines(item._ruPrimary))}</div>
        </div>

        ${definitionsHtml}

        ${relatedHtml ? `
          <div class="card-section">
            <span class="card-label">Связанные термины</span>
            <div class="related-links">${relatedHtml}</div>
          </div>
        ` : ""}

        ${legalDefinition ? `
          <div class="card-section">
            <span class="card-label">Юридическое определение</span>
            <div class="card-value">${escapeHtml(legalDefinition)}</div>
          </div>
        ` : ""}
      `;
    }

    function renderCardsTable() {
      const sorted = getSortedCardsData();

      elements.cardsTableBody.innerHTML = sorted.map(item => {
        const selectedClass = item._id === appState.tableState.selectedId ? "selected-row" : "";
        return `
          <tr class="clickable-row ${selectedClass}" data-id="${escapeHtml(item._id)}" id="card-row-${escapeHtml(item._id)}">
            <td>${buildCardHtml(item)}</td>
          </tr>
        `;
      }).join("");

      elements.cardsTableBody.querySelectorAll("tr").forEach(row => {
        row.addEventListener("click", (event) => {
          const link = event.target.closest(".related-link");
          if (link) return;
          selectCardOnly(row.dataset.id, false);
        });
      });

      elements.cardsTableBody.querySelectorAll(".related-link").forEach(link => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          const targetId = findIdByRelatedText(link.dataset.related || "");
          if (targetId) {
            selectCardOnly(targetId, true);
          }
        });
      });
    }

    function updateCounters() {
      const count = appState.normalizedData.length;
      elements.enCount.textContent = `${count} строк`;
      elements.ruCount.textContent = `${count} строк`;
      elements.cardsCount.textContent = `${count} строк`;
    }

    function clearAlphabetSelectionVisuals() {
      document.querySelectorAll(".alpha-btn.active").forEach(btn => btn.classList.remove("active"));
    }

    function markActiveAlphabet(panel, letter) {
      clearAlphabetSelectionVisuals();
      const selector = `.alpha-btn[data-panel="${panel}"][data-letter="${CSS.escape(letter)}"]`;
      const btn = document.querySelector(selector);
      if (btn) btn.classList.add("active");
    }

    function clearAlphabetState() {
      appState.alphabetState.activePanel = null;
      appState.alphabetState.selectedLetter = "";
      appState.alphabetState.results = [];
      clearAlphabetSelectionVisuals();
    }

    function clearSearchSuggestions() {
      elements.searchSuggestions.innerHTML = "";
      elements.searchSuggestions.classList.remove("visible");
    }

    function setActiveSuggestionVisual(id) {
      elements.searchSuggestions.querySelectorAll(".suggestion-item").forEach(node => {
        node.classList.toggle("active", node.dataset.id === String(id));
      });
    }

    function showSearchSuggestions(items) {
      if (!items.length) {
        clearSearchSuggestions();
        return;
      }

      elements.searchSuggestions.innerHTML = items.map(entry => {
        const activeClass = entry.id === appState.tableState.selectedId ? "active" : "";
        return `
          <div class="suggestion-item ${activeClass}" data-id="${escapeHtml(entry.id)}">
            <div class="suggestion-top">${escapeHtml(entry.top)}</div>
            <div class="suggestion-bottom">${escapeHtml(entry.bottom)}</div>
          </div>
        `;
      }).join("");

      elements.searchSuggestions.classList.add("visible");

      elements.searchSuggestions.querySelectorAll(".suggestion-item").forEach(node => {
        node.addEventListener("click", () => {
          selectCardOnly(node.dataset.id, true);
        });
      });
    }

    function setServiceMessage(text) {
      elements.serviceMessage.textContent = text || "";
    }

    function setActiveResultVisual(id) {
      elements.resultsPanel.querySelectorAll(".result-card").forEach(node => {
        node.classList.toggle("active", node.dataset.id === String(id));
      });
    }

    function renderResultsPanel() {
      setModeLabels(appState.resultsPanelState.mode);

      if (appState.resultsPanelState.mode === "empty" || !appState.resultsPanelState.items.length) {
        elements.resultsPanel.innerHTML = `
          <div class="results-empty">
            Нет активного поиска или выбранной буквы.
          </div>
        `;
        return;
      }

      elements.resultsPanel.innerHTML = appState.resultsPanelState.items.map(entry => {
        const activeClass = entry.id === appState.tableState.selectedId ? "active" : "";
        return `
          <div class="result-card ${activeClass}" data-id="${escapeHtml(entry.id)}">
            <div class="result-title">${escapeHtml(entry.top)}</div>
            <div class="result-sub">${escapeHtml(entry.bottom)}</div>
          </div>
        `;
      }).join("");

      elements.resultsPanel.querySelectorAll(".result-card").forEach(node => {
        node.addEventListener("click", () => {
          selectCardOnly(node.dataset.id, true);
        });
      });
    }

    function scrollCardsOnlyToId(id) {
      const row = document.getElementById(`card-row-${CSS.escape(String(id))}`);
      const wrap = elements.cardsWrap;
      if (!row || !wrap) return;

      const wrapRect = wrap.getBoundingClientRect();
      const rowRect = row.getBoundingClientRect();
      const currentScroll = wrap.scrollTop;
      const topPadding = 48;

      const targetTop = currentScroll + (rowRect.top - wrapRect.top) - topPadding;

      wrap.scrollTo({
        top: Math.max(0, targetTop),
        behavior: "smooth"
      });
    }

    function highlightCardsOnly() {
      elements.cardsTableBody.querySelectorAll("tr").forEach(row => {
        row.classList.toggle("selected-row", row.dataset.id === String(appState.tableState.selectedId));
      });
    }

    function selectCardOnly(id, scrollCards = true) {
      const item = appState.normalizedData.find(x => String(x._id) === String(id));
      if (!item) return;

      appState.tableState.selectedId = item._id;

      highlightCardsOnly();
      setActiveResultVisual(item._id);
      setActiveSuggestionVisual(item._id);

      if (scrollCards) {
        scrollCardsOnlyToId(item._id);
      }
    }

    function findIdByRelatedText(text) {
      const norm = normalizeSearchText(text);
      const exact = appState.normalizedData.find(item => item._enNorm === norm || item._ruNorm === norm);
      return exact ? exact._id : null;
    }

    function handleAlphabetClick(panel, letter) {
      const sameSelection =
        appState.alphabetState.activePanel === panel &&
        appState.alphabetState.selectedLetter === letter;

      if (sameSelection) {
        clearAlphabetState();
        appState.resultsPanelState.mode = "empty";
        appState.resultsPanelState.items = [];
        setServiceMessage("");
        renderResultsPanel();
        return;
      }

      appState.searchState.input = "";
      appState.searchState.language = null;
      appState.searchState.suggestions = [];
      appState.searchState.lastSuccessfulPrefix = "";
      appState.searchState.lastSuccessfulResults = [];
      elements.searchInput.value = "";
      elements.lastPrefixLabel.textContent = "—";
      clearSearchSuggestions();
      updateClearButton();

      appState.alphabetState.activePanel = panel;
      appState.alphabetState.selectedLetter = letter;

      let matches = [];

      if (panel === "en") {
        matches = appState.normalizedData.filter(item => {
          const first = (item._en || "").trim().charAt(0).toUpperCase();
          return first === letter;
        });
      } else {
        matches = appState.normalizedData.filter(item => {
          const first = (item._ruPrimary || "").trim().charAt(0).toUpperCase();
          return first === letter;
        });
      }

      appState.alphabetState.results = matches;
      markActiveAlphabet(panel, letter);

      if (!matches.length) {
        setServiceMessage("нет совпадений no matches");
        appState.resultsPanelState.mode = "alphabet";
        appState.resultsPanelState.items = [];
        renderResultsPanel();
        setModeLabels("empty");
        return;
      }

      setServiceMessage("");
      appState.resultsPanelState.mode = "alphabet";
      appState.resultsPanelState.items = matches.map(item => toClickableEntry(item, panel));
      renderResultsPanel();
      setModeLabels("empty");
    }

    function handleSearchInput() {
      const raw = elements.searchInput.value;
      const trimmed = raw.trim();

      appState.searchState.input = raw;
      clearAlphabetState();
      updateClearButton();

      if (!trimmed) {
        appState.searchState.language = null;
        appState.searchState.suggestions = [];
        appState.searchState.lastSuccessfulPrefix = "";
        appState.searchState.lastSuccessfulResults = [];
        elements.lastPrefixLabel.textContent = "—";
        setServiceMessage("");
        clearSearchSuggestions();
        appState.resultsPanelState.mode = "empty";
        appState.resultsPanelState.items = [];
        renderResultsPanel();
        setModeLabels("empty");
        return;
      }

      const language = detectLanguage(trimmed);
      appState.searchState.language = language;
      setModeLabels(language ? "search" : "пусто");

      if (!language) {
        appState.searchState.suggestions = [];
        clearSearchSuggestions();
        setServiceMessage("Неподдерживаемый алфавит.");
        appState.resultsPanelState.mode = "empty";
        appState.resultsPanelState.items = [];
        renderResultsPanel();
        return;
      }

      const prefix = normalizeSearchText(trimmed);
      let matches = [];

      if (language === "en") {
        matches = appState.normalizedData.filter(item => item._enNorm.startsWith(prefix));
      } else {
        matches = appState.normalizedData.filter(item => item._ruNorm.startsWith(prefix));
      }

      if (matches.length > 0) {
        appState.searchState.lastSuccessfulPrefix = prefix;
        appState.searchState.lastSuccessfulResults = matches;
        elements.lastPrefixLabel.textContent = prefix;
        setServiceMessage("");
        const entries = matches.map(item => toClickableEntry(item, language));
        appState.searchState.suggestions = entries;
        showSearchSuggestions(entries);
        appState.resultsPanelState.mode = "search";
        appState.resultsPanelState.items = entries;
        renderResultsPanel();
        return;
      }

      if (appState.searchState.lastSuccessfulResults.length > 0) {
        elements.lastPrefixLabel.textContent = appState.searchState.lastSuccessfulPrefix || "—";
        setServiceMessage("");
        const entries = appState.searchState.lastSuccessfulResults.map(item => toClickableEntry(item, language));
        appState.searchState.suggestions = entries;
        showSearchSuggestions(entries);
        appState.resultsPanelState.mode = "search";
        appState.resultsPanelState.items = entries;
        renderResultsPanel();
        return;
      }

      elements.lastPrefixLabel.textContent = "—";
      appState.searchState.suggestions = [];
      clearSearchSuggestions();
      setServiceMessage("совпадений нет");
      appState.resultsPanelState.mode = "search";
      appState.resultsPanelState.items = [];
      renderResultsPanel();
    }

    elements.searchInput.addEventListener("input", handleSearchInput);

    elements.clearBtn.addEventListener("click", () => {
      elements.searchInput.value = "";
      handleSearchInput();
      elements.searchInput.focus();
    });

    document.addEventListener("click", (event) => {
      const clickedInsideSearch =
        event.target === elements.searchInput ||
        elements.searchSuggestions.contains(event.target);

      if (!clickedInsideSearch) {
        clearSearchSuggestions();
      }
    });

    loadData();
  </script>
</body>
</html>

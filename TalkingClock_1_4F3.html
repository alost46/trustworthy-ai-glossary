:root{--bg:#0f172a;--fg:#f8fafc;--muted:#94a3b8;--panel:#fff;--text:#111827;--clock-scale:1}

html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--fg);font-family:Arial,sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#app{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(8px,2vh,18px);padding:clamp(6px,2vw,20px)}

#date{margin-top:12px;font-size:min(8vw,calc(36px * var(--clock-scale)));color:var(--muted);text-align:center;max-width:94vw}
#hint{color:var(--muted);font-size:15px;text-align:center;line-height:1.45}

#settingsButton{right:16px}#fullscreenButton{left:16px}
#panelOverlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.72);padding:14px;z-index:50}
#panelOverlay.active{display:flex}
#panel{width:min(660px,96vw);max-height:90vh;overflow:auto;background:var(--panel);color:var(--text);border-radius:20px;padding:20px;box-shadow:0 20px 70px rgba(0,0,0,.45);user-select:text;-webkit-user-select:text}

.btn-main{display:block;font-size:16px;line-height:1.15}.btn-en{display:block;font-size:12px;line-height:1.15;opacity:.82;font-weight:normal;margin-top:2px}.bi-main{display:block}.bi-en{display:block;font-size:12px;line-height:1.2;color:#64748b;font-weight:normal;margin-top:2px}.note-en{color:#64748b}

function normalizeDigits(str){const a="٠١٢٣٤٥٦٧٨٩",b="۰۱۲۳۴۵۶۷۸۹";return String(str).replace(/[٠-٩]/g,ch=>String(a.indexOf(ch))).replace(/[۰-۹]/g,ch=>String(b.indexOf(ch)))}
function toEthiopicNumber(n){n=Number(n);if(!isFinite(n))return String(n);if(n===0)return "0";const ones=["","፩","፪","፫","፬","፭","፮","፯","፰","፱"],tens=["","፲","፳","፴","፵","፶","፷","፸","፹","፺"];function under100(x){return tens[Math.floor(x/10)]+ones[x%10]}let parts=[];let high=Math.floor(n/10000),rem=n%10000;if(high)parts.push(toEthiopicNumber(high)+"፼");let hund=Math.floor(rem/100),last=rem%100;if(hund)parts.push((hund===1?"":under100(hund))+"፻");if(last)parts.push(under100(last));return parts.join("")}
function convertScreenDigits(str){const nu=getDigits();if(nu==="auto")return str;const clean=normalizeDigits(str);if(nu==="latn")return clean;if(nu==="arab")return clean.replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[Number(d)]);if(nu==="arabext")return clean.replace(/\d/g,d=>"۰۱۲۳۴۵۶۷۸۹"[Number(d)]);if(nu==="ethi")return clean.replace(/\d+/g,m=>toEthiopicNumber(Number(m)));return str}
function fmtTime(date,lang=getDisplayLang()){return convertScreenDigits(new Intl.DateTimeFormat(displayLocale(lang),{hour:"2-digit",minute:"2-digit",hour12:false}).format(date))}
function fmtDate(date,lang=getDisplayLang()){return convertScreenDigits(new Intl.DateTimeFormat(displayLocale(lang),{weekday:"long",day:"numeric",month:"long",year:"numeric"}).format(date))}
function updateClock(){const now=new Date();lastClockDate=now;timeBox.textContent=fmtTime(now,getDisplayLang());dateBox.textContent=fmtDate(now,getDisplayLang())}
function findSelectedVoice(){if(selectedVoiceKey==="auto")return null;return getVoices().find(v=>voiceKey(v)===selectedVoiceKey)||null}
function chooseVoice(lang){const explicit=findSelectedVoice();if(explicit)return explicit;const voices=getVoices(),lc=(lang||"").toLowerCase(),base=baseOf(lang);return voices.find(v=>(v.lang||"").toLowerCase()===lc)||voices.find(v=>baseOf(v.lang)===base)||null}
function voiceLine(lang=getSpeechLang()){const voices=getVoices();const base=baseOf(lang);const same=voices.filter(v=>baseOf(v.lang)===base);const explicit=findSelectedVoice();const v=chooseVoice(lang);return `${labelForLang(lang)} ${lang}: voices=${same.length}; selected=${v?`${v.name} [${v.lang}] ${v.localService?"local":"remote"}`:"NO VOICE"}${explicit?"; mode=EXPLICIT":"; mode=AUTO"}`}
function updateVoiceBadge(){const t=tr(getDisplayLang());const v=findSelectedVoice()||chooseVoice(getSpeechLang());voiceBadge.textContent=(v?t.voice+" / voice: "+(v.name||"?")+" ["+(v.lang||"?")+"]":t.voice+" / voice: "+t.auto+" / auto")}
function timeText(lang=getSpeechLang()){const t=tr(lang);const d=lastClockDate||new Date();let tm;try{tm=new Intl.DateTimeFormat(lang,{hour:"numeric",minute:"2-digit"}).format(d)}catch(e){tm=new Intl.DateTimeFormat(undefined,{hour:"numeric",minute:"2-digit"}).format(d)}return t.timeIs+" "+tm}
function dateText(lang=getSpeechLang()){const t=tr(lang);const d0=lastClockDate||new Date();let d;try{d=new Intl.DateTimeFormat(lang,{weekday:"long",day:"numeric",month:"long",year:"numeric"}).format(d0)}catch(e){d=new Intl.DateTimeFormat(undefined,{weekday:"long",day:"numeric",month:"long",year:"numeric"}).format(d0)}return t.todayIs+" "+d}
function testText(lang=getSpeechLang()){return tr(lang).testText+" "+timeText(lang)}
function speak(text,lang=getSpeechLang(),showDiag=true){
 const t=tr(lang);
 if(!("speechSynthesis" in window)){statusBox.textContent=t.noSpeech+' / '+EN.noSpeech;return}
 refreshVoiceUi();
 try{speechSynthesis.cancel()}catch(e){}
 setTimeout(()=>{
  const u=new SpeechSynthesisUtterance(text);u.lang=lang;u.rate=Number(rateRange.value)||1;const v=chooseVoice(lang);if(v)u.voice=v;
  if(showDiag){voicesPanel.classList.add("active");voicesPanel.innerHTML='<div class="mono">'+escapeHtml(t.diag+' / '+EN.diag)+':\n'+escapeHtml(voiceLine(lang))+'\n\n'+escapeHtml(t.text+' / '+EN.text)+':\n'+escapeHtml(text)+'</div>'}
  statusBox.textContent=t.trySpeak+' / '+EN.trySpeak+': '+voiceLine(lang);
  u.onstart=()=>{statusBox.textContent=t.speaking+' / '+EN.speaking+': '+labelForLang(lang)+' / '+lang;updateVoiceBadge()};
  u.onend=()=>{statusBox.textContent=t.ready+' / '+EN.ready+': '+labelForLang(lang)+' / '+lang;updateVoiceBadge()};
  u.onerror=e=>{statusBox.textContent=t.speechError+' / '+EN.speechError+': '+(e.error||'unknown')+'\n'+voiceLine(lang);updateVoiceBadge()};
  try{speechSynthesis.speak(u)}catch(e){statusBox.textContent=t.speechError+' / '+EN.speechError+': '+e.message}
  setTimeout(()=>{if(!speechSynthesis.speaking&&!speechSynthesis.pending)statusBox.textContent=t.speechNotStarted+' / '+EN.speechNotStarted+'. '+voiceLine(lang)},1400)
 },160)
}
function speakTime(){speak(timeText(getSpeechLang()),getSpeechLang(),false)}
function speakDate(){speak(dateText(getSpeechLang()),getSpeechLang(),false)}
function startPress(e){e.preventDefault();longPressFired=false;clearTimeout(longPressTimer);longPressTimer=setTimeout(()=>{longPressFired=true;speakDate()},750)}
function endPress(e){e.preventDefault();clearTimeout(longPressTimer);if(!longPressFired)speakTime()}
clockFace.addEventListener("pointerdown",startPress);clockFace.addEventListener("pointerup",endPress);clockFace.addEventListener("pointercancel",()=>clearTimeout(longPressTimer));clockFace.addEventListener("pointerleave",()=>clearTimeout(longPressTimer));
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function selectVoiceByKey(key){const v=getVoices().find(x=>voiceKey(x)===key);if(!v)return;selectedMode="normal";if(modeSelect)modeSelect.value="normal";selectedVoiceKey=key;selectedLang=v.lang||getLang();addLanguageIfMissing(selectedLang);languageSelect.value=selectedLang;applyUi();updateClock();saveSettings();renderVoiceButtons();statusBox.textContent=tr().voiceChosen+' / '+EN.voiceChosen+':\n'+voiceLine(selectedLang)}
function renderVoiceButtons(){refreshVoiceUi(true);const t=tr();const voices=getVoices().slice().sort((a,b)=>(a.lang+a.name).localeCompare(b.lang+b.name));let html='<div class="mono">'+escapeHtml(t.build+' / '+EN.build)+': '+escapeHtml(BUILD_ID)+'\nspeechSynthesis: '+(("speechSynthesis" in window)?"YES":"NO")+'\n'+escapeHtml(t.totalVoices+' / '+EN.totalVoices)+': '+voices.length+'\n\n'+escapeHtml(t.clickVoice+' / '+EN.clickVoice)+'\n</div>';if(!voices.length){html+='<div class="mono">'+escapeHtml(t.voicesNotLoaded+' / '+EN.voicesNotLoaded)+'</div>'}voices.forEach((v,i)=>{const key=voiceKey(v);const selected=key===selectedVoiceKey;html+=`<button class="voiceButton ${selected?"selected":""}" type="button" data-voice-key="${escapeHtml(key)}"><b>${i+1}. ${escapeHtml(v.lang||"?")} | ${escapeHtml(v.name||"?")}</b><div class="voiceMeta">${v.localService?"local":"remote"} | default=${!!v.default} | ${escapeHtml(t.voiceChosen+" / click = select voice")}</div></button>`});voicesPanel.classList.add("active");voicesPanel.innerHTML=html;voicesPanel.querySelectorAll("button[data-voice-key]").forEach(btn=>btn.onclick=()=>selectVoiceByKey(btn.getAttribute("data-voice-key")))}
function nextTest(){refreshVoiceUi();const langs=currentLangs();const lang=langs[nextIndex%langs.length];nextIndex++;selectedMode="normal";if(modeSelect)modeSelect.value="normal";selectedLang=lang;selectedVoiceKey="auto";addLanguageIfMissing(lang);languageSelect.value=lang;applyUi();updateClock();saveSettings();speak(testText(lang),lang,true);const t=tr(lang);nextLanguageTest.innerHTML=twoLine(t.next+" ("+t.last+": "+labelForLang(lang)+")", EN.next+" ("+EN.last+": "+labelForLang(lang)+")")}
function testDigits(){const t=tr();const nums=["auto","latn","arab","arabext","ethi"],now=new Date(),old=getDigits(),lines=[t.digitsTest+' / '+EN.digitsTest+':'];for(const lang of BASE_LANGS){for(const nu of nums){digitsSelect.value=nu;let sample;try{sample=convertScreenDigits(new Intl.DateTimeFormat(displayLocale(lang),{hour:"2-digit",minute:"2-digit",day:"numeric",month:"long",year:"numeric",hour12:false}).format(now))}catch(e){sample="ERROR: "+e.message}lines.push(`${lang} / ${nu} -> ${sample}`)}lines.push("")}digitsSelect.value=old;voicesPanel.classList.add("active");voicesPanel.innerHTML='<div class="mono">'+escapeHtml(lines.join("\n"))+'</div>';updateClock()}
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredInstallPrompt=e});
window.addEventListener("appinstalled",()=>{deferredInstallPrompt=null;installPanel.classList.add("active");installPanel.textContent=tr().iconCreated+' / '+EN.iconCreated});
async function createIcon(){const t=tr();saveSettings();installPanel.classList.add("active");if(deferredInstallPrompt){const p=deferredInstallPrompt;deferredInstallPrompt=null;installPanel.textContent=t.createOpening+' / '+EN.createOpening;try{p.prompt();const c=await p.userChoice;installPanel.textContent=t.iconResult+' / '+EN.iconResult+': '+(c&&c.outcome?c.outcome:'OK')}catch(e){installPanel.textContent=t.iconFail+' / '+EN.iconFail}}else{installPanel.textContent=/iPad|iPhone|iPod/.test(navigator.userAgent)?(t.iosInstall+' / '+EN.iosInstall):(t.androidInstall+' / '+EN.androidInstall)}}
async function toggleFullscreen(){try{if(document.fullscreenElement)await document.exitFullscreen();else if(document.documentElement.requestFullscreen)await document.documentElement.requestFullscreen()}catch(e){statusBox.textContent=tr().fullscreenFail+' / '+EN.fullscreenFail}}
settingsButton.onclick=()=>{refreshVoiceUi(true);applyUi();panelOverlay.classList.add("active")};
closePanel.onclick=()=>{saveSettings();panelOverlay.classList.remove("active")};
fullscreenButton.onclick=toggleFullscreen;
testVoice.onclick=()=>speak(testText(getSpeechLang()),getSpeechLang(),true);
nextLanguageTest.onclick=nextTest;testDigitsButton.onclick=testDigits;createIconButton.onclick=createIcon;
modeSelect.onchange=()=>{selectedMode=modeSelect.value;if(selectedMode==="am-he"){selectedLang="he-IL";addLanguageIfMissing(selectedLang);languageSelect.value=selectedLang;selectedVoiceKey="auto";}applyUi();updateClock();saveSettings();statusBox.textContent=modeTr(getDisplayLang()).mode+" / "+MODE_I18N.en.mode+": "+modeSelect.options[modeSelect.selectedIndex].textContent};
languageSelect.onchange=()=>{selectedMode="normal";modeSelect.value="normal";selectedLang=languageSelect.value;selectedVoiceKey="auto";applyUi();updateClock();saveSettings();statusBox.textContent=tr().langChosen+' / '+EN.langChosen+': '+labelForLang(getLang())+'\n'+tr().voice+' / '+EN.voice+': '+tr().auto+' / '+EN.auto};
voiceSelect.onchange=()=>{selectedMode="normal";modeSelect.value="normal";selectedVoiceKey=voiceSelect.value;const v=findSelectedVoice();if(v){selectedLang=v.lang||selectedLang;addLanguageIfMissing(selectedLang);languageSelect.value=selectedLang}applyUi();updateClock();saveSettings();statusBox.textContent=v?(tr().voiceChosen+' / '+EN.voiceChosen+':\n'+voiceLine(selectedLang)):(tr().voice+' / '+EN.voice+': '+tr().auto+' / '+EN.auto)};
digitsSelect.onchange=()=>{updateClock();saveSettings();statusBox.textContent=tr().digitsChosen+' / '+EN.digitsChosen+': '+getDigits()};
rateRange.oninput=()=>{rateValue.textContent=Number(rateRange.value).toFixed(1);saveSettings()};
sizeRange.oninput=()=>{sizeValue.textContent=Number(sizeRange.value)+"%";applyClockSize(sizeRange.value);saveSettings()};
if("speechSynthesis" in window){speechSynthesis.onvoiceschanged=()=>refreshVoiceUi(true);setTimeout(()=>refreshVoiceUi(true),300);setTimeout(()=>refreshVoiceUi(true),1500)}
refreshVoiceUi(true);loadSettings();applyUi();updateClock();setInterval(updateClock,1000);
